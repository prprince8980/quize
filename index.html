<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice Quiz (Single Player / Admin)</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        :root {
            --primary: #818cf8;
            --secondary: #c084fc;
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #312e81 100%);
            --glass: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.15);
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --success: #4ade80;
            --danger: #f87171;
            --radius: 20px;
            --input-bg: #1e293b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }

        body {
            background: var(--bg-gradient);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            background-attachment: fixed;
        }

        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            padding: 40px;
            border-radius: var(--radius);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            width: 100%;
            max-width: 500px;
            text-align: center;
            position: relative;
            z-index: 10;
            transition: transform 0.3s ease;
        }

        h1 { font-weight: 800; font-size: 2.2rem; margin-bottom: 10px; background: linear-gradient(to right, #818cf8, #e879f9); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        h2 { font-weight: 600; margin-bottom: 20px; }

        /* Inputs */
        input:not(#manualInput) {
            width: 100%; padding: 16px; border-radius: 12px; border: 1px solid var(--glass-border);
            background: rgba(0, 0, 0, 0.3); color: white; font-size: 1.1rem; margin-bottom: 20px;
            text-align: center; outline: none; transition: border-color 0.3s;
        }
        input:not(#manualInput):focus { border-color: var(--primary); }

        /* Buttons */
        .btn {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white; border: none; padding: 14px 32px; font-size: 1.1rem;
            border-radius: 50px; cursor: pointer; font-weight: 600; width: 100%;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 15px rgba(129, 140, 248, 0.4); margin-bottom: 10px;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(129, 140, 248, 0.6); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        
        .btn-secondary {
            background: rgba(255,255,255,0.1); box-shadow: none; border: 1px solid var(--glass-border);
        }
        .btn-secondary:hover { background: rgba(255,255,255,0.2); }

        /* Screens */
        .screen { display: none; animation: slideUp 0.5s ease; }
        .screen.active { display: block; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* HUD */
        .hud-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .hud-item { background: rgba(0,0,0,0.2); padding: 10px; border-radius: 12px; display: flex; flex-direction: column; align-items: center; }
        .hud-label { font-size: 0.8rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }
        .hud-val { font-size: 1.2rem; font-weight: bold; color: white; }

        /* Timer */
        .timer-track { width: 100%; height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; overflow: hidden; margin-bottom: 25px; }
        .timer-fill { height: 100%; background: var(--success); width: 100%; transition: width 1s linear, background 0.3s; }

        /* Hint Box */
        .hint-box {
            min-height: 120px; display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-size: 1.6rem; margin-bottom: 25px; padding: 20px;
            background: rgba(255,255,255,0.05); border-radius: 16px; border: 1px dashed var(--glass-border);
        }
        .correct-reveal { font-size: 2rem; color: var(--success); font-weight: 800; margin-top: 10px; text-shadow: 0 0 20px rgba(74, 222, 128, 0.4); }
        .wrong-reveal { font-size: 2rem; color: var(--danger); font-weight: 800; margin-top: 10px; }

        /* Mic */
        .mic-container { display: flex; flex-direction: column; align-items: center; justify-content: center; margin-top: 10px; margin-bottom: 20px; }
        .mic-btn {
            width: 70px; height: 70px; border-radius: 50%; background: rgba(255,255,255,0.1);
            border: 2px solid var(--primary); color: white; font-size: 1.8rem; cursor: pointer;
            display: flex; align-items: center; justify-content: center; margin-bottom: 10px;
            transition: all 0.3s; position: relative; z-index: 2;
        }
        .mic-btn.listening { background: var(--primary); box-shadow: 0 0 30px var(--primary); animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

        #audioVis {
            width: 100%; height: 30px; display: flex; align-items: center; justify-content: center; gap: 4px; margin-bottom: 10px;
        }
        .bar { width: 5px; height: 5px; background: var(--secondary); border-radius: 4px; transition: height 0.1s; }
        .mic-btn.listening ~ #audioVis .bar { animation: bounce 0.5s infinite ease-in-out alternate; }
        @keyframes bounce { to { height: 20px; } }

        .transcript { min-height: 24px; color: var(--text-muted); margin-top: 10px; font-style: italic; font-size: 0.9rem; }

        /* Text Input */
        .text-input-wrapper {
            display: flex; flex-direction: column; width: 100%; margin-top: 10px; gap: 8px; z-index: 20;
            border-top: 1px solid rgba(255,255,255,0.1); padding-top: 20px;
        }
        .input-label { font-size: 0.9rem; color: var(--text-muted); font-weight: 600; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 1px; }
        #manualInput {
            flex-grow: 1; background: var(--input-bg) !important; border: 2px solid var(--primary) !important;
            color: white !important; text-align: left !important; margin-bottom: 0 !important;
            padding: 15px !important; font-size: 1.1rem !important; border-radius: 12px !important; width: 100%;
        }
        .send-btn {
            background: var(--primary); color: white; border: none; border-radius: 12px;
            padding: 0 20px; font-size: 1.2rem; cursor: pointer; margin-top: 8px; height: 54px;
            display: flex; align-items: center; justify-content: center; transition: background 0.2s;
        }
        .send-btn:hover { background: var(--secondary); }

        /* --- ADMIN READ-ONLY MODE --- */
        .admin-mode .mic-btn, .admin-mode .send-btn, .admin-mode #nextHintBtn {
            pointer-events: none !important;
            opacity: 0.5 !important;
            cursor: not-allowed !important;
        }
        .admin-mode #manualInput {
            pointer-events: none !important;
            opacity: 0.8 !important;
            cursor: default !important;
        }
        .admin-badge {
            background: var(--danger); color: white; padding: 5px 10px; border-radius: 20px;
            font-size: 0.8rem; font-weight: bold; display: inline-block; margin-bottom: 15px;
        }

        /* Waiting Screen */
        .loading-spinner {
            border: 4px solid rgba(255,255,255,0.1);
            width: 40px; height: 40px; border-radius: 50%;
            border-left-color: var(--primary);
            animation: spin 1s linear infinite; margin: 0 auto 20px auto;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <main>
        <!-- 1. LANDING SCREEN -->
        <div id="landingScreen" class="screen active">
            <div class="glass-card">
                <h1>Voice Quiz</h1>
                <p style="color: var(--text-muted); margin-bottom: 30px;">Real-time Multiplayer Experience</p>
                <button class="btn" onclick="window.app.game.initGame()">Start Game (Player)</button>
                <button class="btn btn-secondary" onclick="window.app.admin.startWatching()">Admin Watch Mode</button>
            </div>
        </div>

        <!-- 2. ADMIN WAITING SCREEN (Only shown if no game is active) -->
        <div id="adminWaitingScreen" class="screen">
            <div class="glass-card">
                <div class="loading-spinner"></div>
                <h2>Waiting for Player</h2>
                <p style="color: var(--text-muted);">Monitoring for active game session...</p>
                <button class="btn btn-secondary" style="margin-top:20px;" onclick="location.reload()">Exit</button>
            </div>
        </div>

        <!-- 3. GAME SCREEN (Used by BOTH Player and Admin) -->
        <div id="gameScreen" class="screen">
            <div class="glass-card" id="gameCard">
                
                <!-- Admin Badge (Only visible for Admin) -->
                <div id="adminBadge" class="admin-badge hidden">ADMIN VIEW MODE</div>

                <!-- HUD -->
                <div class="hud-grid">
                    <div class="hud-item">
                        <span class="hud-label">Question</span>
                        <span class="hud-val" id="qCounter">1/10</span>
                    </div>
                    <div class="hud-item">
                        <span class="hud-label">Score</span>
                        <span class="hud-val" id="scoreVal" style="color: var(--success)">0</span>
                    </div>
                </div>

                <!-- Timer -->
                <div class="timer-track">
                    <div class="timer-fill" id="timerBar"></div>
                </div>

                <!-- Hint/Result Area -->
                <div class="hint-box" id="hintDisplay">Ready...</div>
                
                <button id="nextHintBtn" class="btn btn-secondary" style="width: auto; padding: 8px 20px; font-size: 0.9rem;" onclick="window.app.game.revealNextHint()">Next Hint</button>
                <div style="margin-bottom: 15px; color: var(--secondary); font-weight: bold;">Lives: <span id="livesCount">3</span></div>

                <!-- Game Controls -->
                <div id="gameControls">
                    <!-- Mic Section -->
                    <div class="mic-container">
                        <button class="mic-btn" id="micBtn">🎤</button>
                        <div id="audioVis">
                            <div class="bar"></div><div class="bar"></div><div class="bar"></div>
                            <div class="bar"></div><div class="bar"></div>
                        </div>
                        <div class="transcript" id="transcript">Tap mic to speak</div>
                    </div>

                    <!-- Text Input Section -->
                    <div class="text-input-wrapper">
                        <div class="input-label">Or type your answer:</div>
                        <div style="display: flex; gap: 10px; width: 100%;">
                            <input type="text" id="manualInput" placeholder="Type here..." autocomplete="off">
                            <button class="send-btn" id="sendTextBtn">➤</button>
                        </div>
                    </div>
                </div>

                <!-- NEXT BUTTON (Hidden by default) -->
                <div id="nextBtnContainer" class="hidden" style="margin-top: 20px;">
                    <button class="btn" id="nextQuestionBtn" onclick="window.app.game.nextQuestion()">Next Question ➔</button>
                </div>
            </div>
        </div>

        <!-- 4. RESULT SCREEN -->
        <div id="resultScreen" class="screen">
            <div class="glass-card">
                <h2 id="resultTitle">Quiz Over!</h2>
                <div style="font-size: 4rem; font-weight: 800; color: var(--primary); margin: 20px 0;" id="finalScore">0</div>
                <p id="saveStatus" style="color: var(--text-muted); margin-bottom: 20px;">Saving score...</p>
                <button class="btn" onclick="location.reload()">Play Again</button>
            </div>
        </div>
    </main>

    <script>
        window.app = {};

        // HARDCODED SINGLE USER
        const PLAYER_ID = "player";

        window.onload = function() {
            try {
                let supabaseClient = null;
                if (typeof supabase !== 'undefined') {
                    supabaseClient = supabase.createClient("https://worcmjutlantjutpdsjq.supabase.co", "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndvcmNtanV0bGFudGp1dHBkc2pxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njk3ODczNzIsImV4cCI6MjA4NTM2MzM3Mn0.Od0wLqh0xGxGWiDA3SDHybClPb4SZanbHu6p0wm_KUU");
                } else {
                    alert("Error: Game Library failed to load.");
                    return; 
                }

                const DEMO_DATA = [
                    { answer: "Paris", hints: ["Capital of France", "Eiffel Tower", "City of Light", "Seine River", "Art Museum"] },
                    { answer: "Apple", hints: ["Fruit", "Red or Green", "Grows on trees", "Tech Company", "Keeps doctor away"] },
                    { answer: "Guitar", hints: ["Instrument", "Six strings", "Used in rock", "Has a neck", "Fender makes it"] },
                    { answer: "Moon", hints: ["Space object", "Orbits Earth", "Changes shape", "Neil Armstrong", "Tides"] },
                    { answer: "Python", hints: ["Programming language", "Named after a snake", "Simple syntax", "Used in AI", "Guido created it"] },
                    { answer: "Pizza", hints: ["Italian food", "Round shape", "Cheese on top", "Oven baked", "Pepperoni topping"] },
                    { answer: "Lion", hints: ["Big cat", "King of jungle", "Roars", "Mane", "Africa"] },
                    { answer: "Ocean", hints: ["Large water body", "Salty", "Pacific is one", "Blue", "Fish live here"] },
                    { answer: "Soccer", hints: ["Sport", "Kick ball", "World Cup", "Goal keeper", "11 players"] },
                    { answer: "Coffee", hints: ["Drink", "Caffeine", "Hot", "Beans", "Morning routine"] }
                ];

                window.app.ui = {
                    els: {
                        timerBar: document.getElementById('timerBar'),
                        hintDisplay: document.getElementById('hintDisplay'),
                        qCounter: document.getElementById('qCounter'),
                        scoreVal: document.getElementById('scoreVal'),
                        livesCount: document.getElementById('livesCount'),
                        transcript: document.getElementById('transcript'),
                        micBtn: document.getElementById('micBtn'),
                        nextHintBtn: document.getElementById('nextHintBtn'),
                        gameControls: document.getElementById('gameControls'),
                        nextBtnContainer: document.getElementById('nextBtnContainer'),
                        finalScore: document.getElementById('finalScore'),
                        saveStatus: document.getElementById('saveStatus'),
                        manualInput: document.getElementById('manualInput'),
                        sendTextBtn: document.getElementById('sendTextBtn'),
                        gameCard: document.getElementById('gameCard'),
                        adminBadge: document.getElementById('adminBadge')
                    },
                    showScreen(id) {
                        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
                        const target = document.getElementById(id);
                        if(target) target.classList.add('active');
                    },
                    setAdminMode(isAdmin) {
                        if(isAdmin) {
                            this.els.gameCard.classList.add('admin-mode');
                            this.els.adminBadge.classList.remove('hidden');
                            this.els.micBtn.classList.remove('listening'); // Stop visual pulse
                        } else {
                            this.els.gameCard.classList.remove('admin-mode');
                            this.els.adminBadge.classList.add('hidden');
                        }
                    },
                    resetForQuestion() {
                        this.els.hintDisplay.style.background = "rgba(255,255,255,0.05)";
                        this.els.hintDisplay.innerHTML = "Loading...";
                        this.els.transcript.textContent = "Tap mic to speak";
                        this.els.transcript.style.color = "var(--text-muted)";
                        this.els.gameControls.classList.remove('hidden');
                        this.els.nextBtnContainer.classList.add('hidden');
                        this.els.nextHintBtn.classList.remove('hidden');
                        this.els.micBtn.classList.remove('hidden');
                        this.els.manualInput.value = "";
                        this.els.manualInput.disabled = false;
                        this.els.sendTextBtn.disabled = false;
                    },
                    showRoundEnd(isWin, answer) {
                        this.els.gameControls.classList.add('hidden');
                        this.els.nextHintBtn.classList.add('hidden');
                        this.els.nextBtnContainer.classList.remove('hidden');
                        if (isWin) {
                            this.els.hintDisplay.innerHTML = `<span class="correct-reveal">Correct!</span>`;
                            this.els.transcript.textContent = "Well done!";
                            this.els.transcript.style.color = "var(--success)";
                        } else {
                            this.els.hintDisplay.style.background = "rgba(248, 113, 113, 0.1)";
                            this.els.hintDisplay.innerHTML = `<div>Answer:</div><div class="wrong-reveal">${answer}</div>`;
                            this.els.transcript.textContent = "Better luck next time.";
                            this.els.transcript.style.color = "var(--danger)";
                        }
                    },
                    setMicStatus(status) {
                        this.els.transcript.textContent = status;
                    }
                };

                window.app.game = {
                    data: [],
                    idx: 0,
                    score: 0,
                    lives: 3,
                    hintIdx: 0,
                    currentQ: null,
                    timer: null,
                    playerName: PLAYER_ID,
                    isPlaying: false,
                    isPlayer: true,

                    async initGame() {
                        // No Name Input anymore
                        try {
                            const { data: rows, error } = await supabaseClient.from('game_data').select('*');
                            if (error) throw error;
                            this.data = rows.length ? rows : DEMO_DATA;
                        } catch (e) {
                            console.warn("DB Error, using demo data", e);
                            this.data = DEMO_DATA;
                        }

                        this.data = this.data.sort(() => 0.5 - Math.random()).slice(0, 10);
                        this.idx = 0;
                        this.score = 0;
                        this.isPlayer = true;
                        
                        window.app.ui.setAdminMode(false);
                        await this.updateLiveSession('playing');
                        window.app.ui.showScreen('gameScreen');
                        this.loadQuestion();
                    },

                    loadQuestion() {
                        if (this.idx >= 10) {
                            this.endGame();
                            return;
                        }
                        this.currentQ = this.data[this.idx];
                        this.lives = 3;
                        this.hintIdx = 0;
                        this.isPlaying = true;

                        window.app.ui.els.livesCount.textContent = this.lives;
                        window.app.ui.els.qCounter.textContent = `${this.idx + 1}/10`;
                        window.app.ui.els.scoreVal.textContent = this.score;
                        window.app.ui.els.nextHintBtn.disabled = false;
                        window.app.ui.els.nextHintBtn.textContent = "Show Hint 1";
                        
                        window.app.ui.resetForQuestion();
                        this.showHint();
                        this.startTimer(30);
                        this.updateLiveSession('playing'); 
                    },

                    showHint() {
                        window.app.ui.els.hintDisplay.textContent = this.currentQ.hints[this.hintIdx];
                    },

                    revealNextHint() {
                        if (this.hintIdx < this.currentQ.hints.length - 1) {
                            this.hintIdx++;
                            this.showHint();
                            this.updateLiveSession('playing'); // Sync hint index
                        }
                        window.app.ui.els.nextHintBtn.disabled = (this.hintIdx >= this.currentQ.hints.length - 1);
                    },

                    startTimer(seconds) {
                        let left = seconds;
                        window.app.ui.els.timerBar.style.width = '100%';
                        window.app.ui.els.timerBar.style.backgroundColor = 'var(--success)';
                        
                        clearInterval(this.timer);
                        this.timer = setInterval(() => {
                            left--;
                            const pct = (left / seconds) * 100;
                            window.app.ui.els.timerBar.style.width = `${pct}%`;
                            
                            if(left <= 10) window.app.ui.els.timerBar.style.backgroundColor = 'var(--danger)';

                            if (left <= 0) {
                                this.handleLoss("Time's up!");
                            }
                            
                            if (this.isPlayer && left % 1 === 0) {
                                this.updateLiveSession('playing', left);
                            }
                        }, 1000);
                    },

                    async handleGuess(text, source = "voice") {
                        if (!this.isPlaying) return;
                        
                        const input = text.toLowerCase().trim().replace(/[^a-z0-9]/g, "");
                        const answer = this.currentQ.answer.toLowerCase().trim().replace(/[^a-z0-9]/g, "");

                        const prefix = source === "text" ? "You typed" : "You said";
                        window.app.ui.setMicStatus(`${prefix}: "${text}"`);

                        if (input === answer) {
                            this.isPlaying = false;
                            clearInterval(this.timer);
                            const points = Math.max(0, 6 - this.hintIdx);
                            this.score += points;
                            if (typeof confetti !== 'undefined') confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });
                            window.app.ui.showRoundEnd(true);
                            await this.updateLiveSession('playing');
                        } else {
                            this.lives--;
                            window.app.ui.els.livesCount.textContent = this.lives;
                            await this.updateLiveSession('playing', null, this.lives);
                            
                            if (this.lives <= 0) {
                                this.handleLoss("Wrong!");
                            } else {
                                window.app.ui.setMicStatus("Wrong! Try again.");
                                window.app.ui.els.transcript.style.color = "var(--danger)";
                                if(source === "text") window.app.ui.els.manualInput.focus();
                            }
                        }
                    },

                    async handleLoss(reason) {
                        this.isPlaying = false;
                        clearInterval(this.timer);
                        window.app.ui.showRoundEnd(false, this.currentQ.answer);
                        await this.updateLiveSession('playing');
                    },

                    async nextQuestion() {
                        this.idx++;
                        this.loadQuestion();
                    },

                    async endGame() {
                        window.app.ui.showScreen('resultScreen');
                        window.app.ui.els.finalScore.textContent = this.score;
                        await this.updateLiveSession('finished');

                        try {
                            await supabaseClient.from('user_scores').insert([{ user_name: this.playerName, score: this.score }]);
                            window.app.ui.els.saveStatus.textContent = "Score Saved!";
                        } catch (e) { console.error(e); window.app.ui.els.saveStatus.textContent = "Save Error"; }
                    },

                    async updateLiveSession(status, timeLeft = null, livesOverride = null) {
                        if(!this.isPlayer) return;

                        try {
                            const payload = {
                                user_name: this.playerName,
                                current_score: this.score,
                                question_number: this.idx + 1,
                                status: status,
                                last_updated: new Date()
                            };

                            if (status === 'playing' && this.currentQ) {
                                payload.current_question_answer = this.currentQ.answer;
                                payload.current_question_hint = this.currentQ.hints[this.hintIdx] || this.currentQ.hints[0];
                                payload.hint_index = this.hintIdx;
                                payload.lives_remaining = livesOverride !== null ? livesOverride : this.lives;
                                payload.timer_remaining = timeLeft !== null ? timeLeft : (this.isPlaying ? 30 : 0);
                                const textVal = window.app.ui.els.manualInput.value;
                                if(textVal) payload.last_input = textVal;
                            }

                            await supabaseClient.from('live_sessions').upsert(payload, { onConflict: 'user_name' });
                        } catch (e) { console.error("Live update failed", e); }
                    }
                };

                window.app.admin = {
                    channel: null,
                    
                    async startWatching() {
                        this.isPlayer = false;
                        window.app.ui.setAdminMode(true);
                        
                        // 1. Check for existing active game
                        const { data, error } = await supabaseClient
                            .from('live_sessions')
                            .select('*')
                            .eq('user_name', PLAYER_ID)
                            .single();
                        
                        // 2. If game is playing, show it immediately
                        if (data && data.status === 'playing') {
                            this.syncUI(data);
                            window.app.ui.showScreen('gameScreen');
                        } else {
                            // 3. If not, show Waiting Screen
                            window.app.ui.showScreen('adminWaitingScreen');
                        }

                        // 4. Subscribe to changes
                        if (this.channel) this.channel.unsubscribe();

                        this.channel = supabaseClient
                            .channel(`admin-monitor`)
                            .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'live_sessions', filter: `user_name=eq.${PLAYER_ID}` }, (payload) => {
                                if(payload.new.status === 'playing') {
                                    this.syncUI(payload.new);
                                    window.app.ui.showScreen('gameScreen');
                                } else if (payload.new.status === 'finished') {
                                    // Keep showing game or switch to result? Let's stick to game screen but state is finished
                                    this.syncUI(payload.new);
                                    window.app.ui.showScreen('gameScreen');
                                }
                            })
                            // Listen for INSERT (New Game Start)
                            .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'live_sessions', filter: `user_name=eq.${PLAYER_ID}` }, (payload) => {
                                if(payload.new.status === 'playing') {
                                    this.syncUI(payload.new);
                                    window.app.ui.showScreen('gameScreen');
                                }
                            })
                            .subscribe();
                    },

                    syncUI(data) {
                        window.app.ui.els.scoreVal.textContent = data.current_score;
                        window.app.ui.els.qCounter.textContent = `${data.question_number}/10`;
                        window.app.ui.els.livesCount.textContent = data.lives_remaining;
                        
                        if(data.timer_remaining >= 0) {
                            const pct = (data.timer_remaining / 30) * 100;
                            window.app.ui.els.timerBar.style.width = `${pct}%`;
                            if(data.timer_remaining <= 10) window.app.ui.els.timerBar.style.backgroundColor = 'var(--danger)';
                            else window.app.ui.els.timerBar.style.backgroundColor = 'var(--success)';
                        }

                        if (data.status === 'playing' && data.current_question_hint) {
                            window.app.ui.els.hintDisplay.textContent = data.current_question_hint;
                            window.app.ui.els.nextHintBtn.disabled = (data.hint_index > 0);
                            window.app.ui.els.nextHintBtn.textContent = data.hint_index > 0 ? "Next Hint (Locked)" : "Show Hint 1";
                        }

                        if(data.last_input) {
                            window.app.ui.els.manualInput.value = data.last_input;
                        }
                        
                        window.app.ui.els.transcript.textContent = "Live View...";
                    }
                };

                // --- MIC SYSTEM ---
                if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
                    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                    const r = new SpeechRecognition();
                    r.continuous = false; r.lang = 'en-US'; r.maxAlternatives = 1;
                    const micBtn = window.app.ui.els.micBtn;
                    
                    r.onstart = () => {
                        if(window.app.game.isPlayer) micBtn.classList.add('listening');
                        window.app.ui.setMicStatus("Listening...");
                    };
                    r.onend = () => {
                        if(window.app.game.isPlayer) micBtn.classList.remove('listening');
                        if (window.app.game.isPlaying && window.app.ui.els.transcript.textContent === "Listening...") {
                             window.app.ui.setMicStatus("Tap mic to try again");
                        }
                    };
                    r.onresult = (e) => { window.app.game.handleGuess(e.results[0][0].transcript, "voice"); };
                    r.onerror = (event) => {
                        if(window.app.game.isPlayer) micBtn.classList.remove('listening');
                        window.app.ui.setMicStatus("Error: " + event.error);
                        window.app.ui.els.transcript.style.color = "var(--danger)";
                    };
                    micBtn.onclick = () => { 
                        if(window.app.game.isPlaying && window.app.game.isPlayer) { 
                            try { r.start(); } catch(e){ r.stop(); } 
                        } 
                    };
                } else {
                    window.app.ui.els.micBtn.style.display = 'none';
                    window.app.ui.els.transcript.textContent = "Speech API not supported";
                }

                // --- TEXT INPUT SYSTEM ---
                const manualInput = window.app.ui.els.manualInput;
                const sendBtn = window.app.ui.els.sendTextBtn;

                function submitText() {
                    const text = manualInput.value;
                    if(!text) return;
                    window.app.game.handleGuess(text, "text");
                    manualInput.value = ''; 
                }

                sendBtn.addEventListener('click', submitText);
                manualInput.addEventListener('keydown', (e) => {
                    if(e.key === 'Enter') submitText();
                });
                
                manualInput.addEventListener('input', () => {
                   if(window.app.game.isPlayer) window.app.game.updateLiveSession('playing');
                });

                console.log("App Initialized Successfully");
            } catch (err) {
                console.error("Critical Initialization Error:", err);
                alert("There was a problem loading the game. Please refresh the page.");
            }
        };
    </script>
</body>
</html>
